<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: #1e293b;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        nav h1 { color: #38bdf8; font-size: 22px; }

        #nav-user { font-size: 14px; color: #94a3b8; }

        #logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }

        /* Pages */
        .page { display: none; padding: 40px 32px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }

        /* Cards */
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* Forms */
        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #94a3b8;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
        }

        /* Buttons */
        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger  { background: #ef4444; color: white; }
        .btn-secondary { background: #475569; color: white; }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .alert-success { background: #166534; color: #86efac; }
        .alert-error   { background: #7f1d1d; color: #fca5a5; }

        /* Balance Cards */
        .balance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .balance-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            text-align: center;
        }

        .balance-card .amount {
            font-size: 28px;
            font-weight: 700;
            color: #22c55e;
        }

        .balance-card .label {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Wallet List */
        .wallet-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .wallet-item:hover { border-color: #38bdf8; }
        .wallet-item .wallet-name { font-weight: 600; }
        .wallet-item .wallet-balance { color: #22c55e; font-weight: 700; }

        /* Transaction List */
        .transaction-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        .transaction-item .desc { font-size: 14px; color: #cbd5e1; }
        .transaction-item .date { font-size: 12px; color: #64748b; }

        .income  { color: #22c55e; font-weight: 700; }
        .expense { color: #ef4444; font-weight: 700; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            width: auto;
            font-weight: 500;
        }

        .tab.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        /* Switch link */
        .switch-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .switch-link a {
            color: #38bdf8;
            cursor: pointer;
            text-decoration: underline;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav>
    <h1>💰 Money Tracker</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="nav-user"></span>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- AUTH PAGE -->
<div id="auth-page" class="page active">
    <div style="max-width: 420px; margin: 60px auto;">

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <div class="card">
            <div id="auth-alert" class="alert"></div>

            <!-- Login Form -->
            <div id="login-form">
                <h2>Welcome Back 👋</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Your password">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <h2>Create Account 🚀</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters">
                </div>
                <button class="btn-primary" onclick="register()">Create Account</button>
            </div>
        </div>
    </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboard-page" class="page">

    <!-- Balance Overview -->
    <div id="balance-grid" class="balance-grid"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">

        <!-- Left Column -->
        <div>
            <!-- Wallets -->
            <div class="card">
                <h2>💼 My Wallets</h2>
                <div id="wallets-list"></div>
                <button class="btn-secondary" onclick="showCreateWallet()" style="margin-top:8px;">
                    + Add Wallet
                </button>
            </div>

            <!-- Create Wallet Form -->
            <div class="card" id="create-wallet-form" style="display:none;">
                <h2>New Wallet</h2>
                <div id="wallet-alert" class="alert"></div>
                <div class="form-group">
                    <label>Wallet Name</label>
                    <input type="text" id="wallet-name" placeholder="e.g. Business Account">
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-primary" onclick="createWallet()">Create</button>
                    <button class="btn-secondary" onclick="hideCreateWallet()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <!-- Add Transaction -->
            <div class="card">
                <h2>➕ Add Transaction</h2>
                <div id="transaction-alert" class="alert"></div>
                <div class="form-group">
                    <label>Wallet</label>
                    <select id="tx-wallet"></select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="tx-type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="tx-amount" placeholder="0.00" min="0.01">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="tx-desc" placeholder="e.g. Salary, Groceries">
                </div>
                <button class="btn-success" onclick="addTransaction()">Add Transaction</button>
            </div>
        </div>
    </div>

    <!-- Transactions -->
    <div class="card">
        <h2>📊 Recent Transactions</h2>
        <div id="transactions-list"></div>
    </div>
</div>

<script>
    const API = 'http://127.0.0.1:8000/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let wallets = [];

    // Check if already logged in
    if (token) { loadDashboard(); }

    // =====================
    // AUTH FUNCTIONS
    // =====================

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function register() {
        const name     = document.getElementById('reg-name').value;
        const email    = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        try {
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                token = data.access_token;
                localStorage.setItem('token', token);
                showAlert('auth-alert', 'Account created! Loading dashboard...', 'success');
                setTimeout(loadDashboard, 1000);
            } else {
                showAlert('auth-alert', data.message || 'Registration failed', 'error');
            }
        } catch (e) {
            showAlert('auth-alert', 'Cannot connect to server. Is it running?', 'error');
        }
    }

    async function login() {
        const email    = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                token = data.access_token;
                localStorage.setItem('token', token);
                loadDashboard();
            } else {
                showAlert('auth-alert', data.message || 'Login failed', 'error');
            }
        } catch (e) {
            showAlert('auth-alert', 'Cannot connect to server. Is it running?', 'error');
        }
    }

    async function logout() {
        await fetch(`${API}/logout`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        localStorage.removeItem('token');
        token = null;
        showPage('auth-page');
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('nav-user').textContent = '';
    }

    // =====================
    // DASHBOARD FUNCTIONS
    // =====================

    async function loadDashboard() {
        try {
            const res  = await fetch(`${API}/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!res.ok) {
                localStorage.removeItem('token');
                showPage('auth-page');
                return;
            }

            currentUser = data.user;
            wallets     = data.user.wallets;

            // Update nav
            document.getElementById('nav-user').textContent    = `👤 ${currentUser.name}`;
            document.getElementById('logout-btn').style.display = 'block';

            renderBalances();
            renderWallets();
            await loadAllTransactions();
            showPage('dashboard-page');

        } catch (e) {
            showPage('auth-page');
        }
    }

    function renderBalances() {
        const grid = document.getElementById('balance-grid');
        grid.innerHTML = `
            <div class="balance-card">
                <div class="amount">KES ${Number(currentUser.total_balance).toLocaleString()}</div>
                <div class="label">Total Balance</div>
            </div>
            ${wallets.map(w => `
                <div class="balance-card">
                    <div class="amount" style="font-size:22px">KES ${Number(w.balance).toLocaleString()}</div>
                    <div class="label">${w.name}</div>
                </div>
            `).join('')}
        `;
    }

    function renderWallets() {
        const list   = document.getElementById('wallets-list');
        const select = document.getElementById('tx-wallet');

        if (wallets.length === 0) {
            list.innerHTML = '<p style="color:#64748b; font-size:14px;">No wallets yet. Create one!</p>';
            select.innerHTML = '<option>No wallets available</option>';
            return;
        }

        list.innerHTML = wallets.map(w => `
            <div class="wallet-item">
                <span class="wallet-name">💼 ${w.name}</span>
                <span class="wallet-balance">KES ${Number(w.balance).toLocaleString()}</span>
            </div>
        `).join('');

        select.innerHTML = wallets.map(w =>
            `<option value="${w.id}">${w.name}</option>`
        ).join('');
    }

    async function loadAllTransactions() {
        const list = document.getElementById('transactions-list');
        let allTransactions = [];

        for (const wallet of wallets) {
            const res  = await fetch(`${API}/wallets/${wallet.id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.wallet && data.wallet.transactions) {
                data.wallet.transactions.forEach(tx => {
                    allTransactions.push({ ...tx, wallet_name: wallet.name });
                });
            }
        }

        if (allTransactions.length === 0) {
            list.innerHTML = '<p style="color:#64748b; font-size:14px;">No transactions yet.</p>';
            return;
        }

        // Sort newest first
        allTransactions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        list.innerHTML = allTransactions.map(tx => `
            <div class="transaction-item">
                <div>
                    <div class="desc">${tx.description || 'No description'} 
                        <span style="color:#475569; font-size:12px;">• ${tx.wallet_name}</span>
                    </div>
                    <div class="date">${new Date(tx.created_at).toLocaleDateString()}</div>
                </div>
                <div class="${tx.type === 'income' ? 'income' : 'expense'}">
                    ${tx.type === 'income' ? '+' : '-'} KES ${Number(tx.amount).toLocaleString()}
                </div>
            </div>
        `).join('');
    }

    // =====================
    // WALLET FUNCTIONS
    // =====================

    function showCreateWallet()  { document.getElementById('create-wallet-form').style.display = 'block'; }
    function hideCreateWallet()  { document.getElementById('create-wallet-form').style.display = 'none'; }

    async function createWallet() {
        const name = document.getElementById('wallet-name').value;
        if (!name) { showAlert('wallet-alert', 'Please enter a wallet name', 'error'); return; }

        const res  = await fetch(`${API}/wallets`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ user_id: currentUser.id, name })
        });

        const data = await res.json();

        if (res.ok) {
            showAlert('wallet-alert', 'Wallet created!', 'success');
            document.getElementById('wallet-name').value = '';
            setTimeout(() => { hideCreateWallet(); loadDashboard(); }, 1000);
        } else {
            showAlert('wallet-alert', data.message || 'Failed to create wallet', 'error');
        }
    }

    // =====================
    // TRANSACTION FUNCTIONS
    // =====================

    async function addTransaction() {
        const wallet_id   = document.getElementById('tx-wallet').value;
        const type        = document.getElementById('tx-type').value;
        const amount      = document.getElementById('tx-amount').value;
        const description = document.getElementById('tx-desc').value;

        if (!amount) { showAlert('transaction-alert', 'Please enter an amount', 'error'); return; }

        const res  = await fetch(`${API}/transactions`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ wallet_id, type, amount: parseFloat(amount), description })
        });

        const data = await res.json();

        if (res.ok) {
            showAlert('transaction-alert', `Transaction added! New balance: KES ${Number(data.wallet_new_balance).toLocaleString()}`, 'success');
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-desc').value   = '';
            setTimeout(loadDashboard, 1000);
        } else {
            showAlert('transaction-alert', data.message || 'Transaction failed', 'error');
        }
    }

    // =====================
    // HELPER FUNCTIONS
    // =====================

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function showAlert(id, message, type) {
        const alert       = document.getElementById(id);
        alert.textContent = message;
        alert.className   = `alert alert-${type}`;
        alert.style.display = 'block';
        setTimeout(() => { alert.style.display = 'none'; }, 4000);
    }
</script>
</body>
</html>
